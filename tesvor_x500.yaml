esphome:
  name: "x500"
  friendly_name: ProjectGizmo

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 115200

ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Gizmo-Fallback"
    password: !secret wifi_fallback

globals:
  - id: batdataglob
    type: uint8_t
    restore_value: true
    initial_value: "0"

  - id: vacstate_pending
    type: std::string
    restore_value: false
    initial_value: '""'

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      delimiter: "\r\n"
    sequence:
      - lambda: |-
          UARTDebug::log_hex(direction, bytes, ' ');

          // Nur eingehende Frames auswerten
          if (direction != UART_DIRECTION_RX) return;

          // Nur das bekannte Status-Frame dekodieren
          // AA 1C 06 FF ...
          const bool is_status_frame =
              bytes.size() >= 31 &&
              bytes[0] == 0xAA &&
              bytes[1] == 0x1C &&
              bytes[2] == 0x06 &&
              bytes[3] == 0xFF;

          if (!is_status_frame) return;

          // --- Fan speed status decode ---
          // bytes[8] = 0x00 => Normal
          // bytes[8] = 0x01 => Strong
          if (bytes[8] == 0x00) {
            id(fan_speed).publish_state("Normal");
          } else if (bytes[8] == 0x01) {
            id(fan_speed).publish_state("Strong");
          }

          // --- Vacuum state decode ---
          std::string new_state;
          switch (bytes[6]) {
            case 0x09: new_state = "error";       break;
            case 0x08: new_state = "docked";      break;
            case 0x06: new_state = "docked";      break; // charging -> docked
            case 0x05: new_state = "hibernated";  break;
            case 0x04: new_state = "idle";        break;
            case 0x03: new_state = "returning";   break;
            case 0x02: new_state = "cleaning";    break;
            default:   new_state = "";            break;
          }

          if (!new_state.empty()) {
            if (id(vacstate_pending) != new_state) {
              id(vacstate_pending) = new_state;
              id(vacstate_debounce_commit).execute();
            }
          }

          // --- Battery decode ---
          // bytes[29] enthält im Status-Frame den Akkustand
          // Nur plausible Werte übernehmen
          if (bytes[29] <= 100) {
            id(batdataglob) = bytes[29];
            id(batdata).publish_state(id(batdataglob));
          }

          // --- Error decode ---
          // bytes[28] enthält den Fehlercode, wenn bytes[6] == 0x09
          if (bytes[6] != 0x09) {
            id(errorstate).publish_state("no error");
          } else {
            switch (bytes[28]) {
              case 0x02: id(errorstate).publish_state("rolling brush blocked"); break;
              case 0x04: id(errorstate).publish_state("wheels blocked"); break;
              case 0x07: id(errorstate).publish_state("side brush blocked"); break;
              case 0x09: id(errorstate).publish_state("front guard jammed"); break;
              default:   id(errorstate).publish_state("error"); break;
            }
          }

script:
  - id: x500_wake
    mode: restart
    then:
      # Confirmed wake pattern: 2x "Move Back", then "Stop"
      - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x03, 0x26]
      - delay: 120ms
      - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x03, 0x26]
      - delay: 120ms
      - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x04, 0x27]
      - delay: 150ms

  - id: x500_wake_if_needed
    mode: restart
    then:
      - lambda: |-
          // Only send the wake sequence if the vacuum is currently hibernated
          if (id(vacstate).state == "hibernated") {
            ESP_LOGD("x500", "Wake needed (hibernated), sending wake sequence");
            id(x500_wake).execute();
          }

  - id: vacstate_debounce_commit
    mode: restart
    then:
      - delay: 3s
      - lambda: |-
          // Nur committen, wenn sich der Pending-State nicht wieder geändert hat
          // (mode: restart sorgt dafür, dass die 3s jedes Mal neu starten)
          if (id(vacstate).state != id(vacstate_pending)) {
            id(vacstate).publish_state(id(vacstate_pending));
          }

text_sensor:
  - platform: template
    id: vacstate
    name: Vacuum State

  - platform: template
    id: errorstate
    name: Error State

sensor:
  - platform: template
    name: Battery
    id: batdata
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never

  - platform: uptime
    name: Uptime

  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s

select:
  - platform: template
    name: Fan Speed
    id: fan_speed
    optimistic: true
    options:
      - Normal
      - Strong
    set_action:
      - script.execute: x500_wake_if_needed
      - lambda: |-
          // Fan speed command frames (as observed/derived)
          const uint8_t normal_cmd[] = {0xAA, 0x03, 0x02, 0x24, 0x00, 0x26};
          const uint8_t strong_cmd[] = {0xAA, 0x03, 0x02, 0x24, 0x02, 0x28};

          const uint8_t *p = normal_cmd;
          size_t n = sizeof(normal_cmd);

          if (x == "Strong") {
            p = strong_cmd;
            n = sizeof(strong_cmd);
          }

          id(uart_bus).write_array(p, n);
          id(uart_bus).flush();

button:
  - platform: template
    name: Smart Cleaning
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x22, 0x02, 0x26]

  - platform: template
    name: Spot Cleaning
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x22, 0x01, 0x25]

  - platform: template
    name: Edge Cleaning
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x22, 0x00, 0x24]

  - platform: template
    name: Stop
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x26, 0x00, 0x28]

  - platform: template
    name: Go Charge
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x22, 0x03, 0x27]

  - platform: template
    name: Move Front
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x00, 0x23]
        - delay: 120ms
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x04, 0x27]

  - platform: template
    name: Move Back
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x03, 0x26]
        - delay: 120ms
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x04, 0x27]

  - platform: template
    name: Move Left
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x01, 0x24]
        - delay: 120ms
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x04, 0x27]

  - platform: template
    name: Move Right
    on_press:
      then:
        - script.execute: x500_wake_if_needed
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x02, 0x25]
        - delay: 120ms
        - uart.write: [0xAA, 0x03, 0x02, 0x21, 0x04, 0x27]

  - platform: restart
    name: Reboot
